# Auto-deploy to the DigitalOcean droplet on every push to master.
# Required repo secrets (Settings → Secrets and variables → Actions):
#   DROPLET_HOST     droplet IP or hostname
#   DROPLET_USER     SSH username (e.g. root)
#   DROPLET_SSH_KEY  private key whose public half is in ~/.ssh/authorized_keys on the droplet
name: Deploy

on:
  push:
    branches: [master]
  workflow_dispatch: {}

concurrency:
  group: production-deploy
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy over SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.DROPLET_HOST }}
          username: ${{ secrets.DROPLET_USER }}
          key: ${{ secrets.DROPLET_SSH_KEY }}
          command_timeout: 15m
          script: |
            set -e
            cd /opt/shabat_clock
            # refresh the deploy script itself first, then run it
            git fetch origin master
            git reset --hard origin/master
            bash deploy/deploy.sh
