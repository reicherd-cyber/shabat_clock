name: CI

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
      - run: npm ci
      - name: Syntax check
        run: npm run check
      - name: Tests
        run: npm test
      - name: Dependency audit
        run: npm audit --audit-level=high
