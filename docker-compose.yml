# Local development stack: MySQL + Mosquitto (MQTT broker).
# Not for production — creds are dev-only and the broker allows anonymous access.
#   docker compose up -d        # start
#   docker compose down         # stop (keeps data volume)
#   docker compose down -v      # stop and wipe the db
services:
  mysql:
    image: mysql:8.4
    container_name: shabat-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: devpass
      MYSQL_DATABASE: shabat_clock
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-pdevpass"]
      interval: 5s
      timeout: 3s
      retries: 20

  mosquitto:
    image: eclipse-mosquitto:2
    container_name: shabat-mosquitto
    restart: unless-stopped
    ports:
      - "1883:1883"
    volumes:
      - ./mosquitto/mosquitto.conf:/mosquitto/config/mosquitto.conf:ro

volumes:
  mysql_data:
